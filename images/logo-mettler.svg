    <ellipse cx="60" cy="157" rx="4" ry="6" transform="rotate(-68 60 157)" fill="#2D3A52"/>
    <!-- Branch stem LEFT -->
    <path d="M 250 80 Q 180 90 130 115 Q 90 135 65 175" stroke="#2D3A52" stroke-width="1.8" fill="none"/>

