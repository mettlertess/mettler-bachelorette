    <!-- Branch stem RIGHT -->
    <path d="M 250 80 Q 320 90 370 115 Q 410 135 435 175" stroke="#2D3A52" stroke-width="1.8" fill="none"/>

    <!-- Grape vine center arch -->
    <path d="M 195 95 Q 210 70 250 62 Q 290 70 305 95" stroke="#2D3A52" stroke-width="1.5" fill="none"/>
    <!-- Vine tendrils -->
    <path d="M 200 90 Q 188 78 192 68 Q 196 58 205 62" stroke="#2D3A52" stroke-width="1.2" fill="none"/>
    <path d="M 300 90 Q 312 78 308 68 Q 304 58 295 62" stroke="#2D3A52" stroke-width="1.2" fill="none"/>

    <!-- Grape leaf center -->
    <path d="M 250 62 C 235 50 220 55 222 68 C 224 78 238 80 250 75 C 262 80 276 78 278 68 C 280 55 265 50 250 62 Z"/>
    <!-- Leaf veins -->
    <path d="M 250 62 L 250 75" stroke="#FDF7EE" stroke-width="0.8" fill="none"/>
    <path d="M 250 65 L 238 70" stroke="#FDF7EE" stroke-width="0.6" fill="none"/>
    <path d="M 250 65 L 262 70" stroke="#FDF7EE" stroke-width="0.6" fill="none"/>

    <!-- Side grape leaves -->
    <path d="M 210 80 C 196 70 184 74 186 85 C 188 93 200 95 210 90 C 218 95 228 93 228 85 C 228 74 218 70 210 80 Z" transform="rotate(-15 210 80)"/>
    <path d="M 290 80 C 276 70 264 74 266 85 C 268 93 280 95 290 90 C 298 95 308 93 308 85 C 308 74 298 70 290 80 Z" transform="rotate(15 290 80)"/>

    <!-- Grape cluster - main berries -->
    <circle cx="250" cy="95" r="6.5"/>
    <circle cx="241" cy="107" r="6"/>
    <circle cx="259" cy="107" r="6"/>
    <circle cx="233" cy="118" r="5.5"/>
    <circle cx="250" cy="118" r="5.5"/>
    <circle cx="267" cy="118" r="5.5"/>
    <circle cx="241" cy="129" r="5"/>
    <circle cx="259" cy="129" r="5"/>
    <circle cx="250" cy="140" r="4.5"/>
    <!-- Grape highlight dots -->
    <circle cx="248" cy="93" r="1.5" fill="#FDF7EE" opacity="0.6"/>
    <circle cx="239" cy="105" r="1.4" fill="#FDF7EE" opacity="0.6"/>
    <circle cx="257" cy="105" r="1.4" fill="#FDF7EE" opacity="0.6"/>

